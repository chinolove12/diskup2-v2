<input type="date" id="date" value="今日の日付">
<input type="number" id="diff" placeholder="差枚">
<input type="number" id="expect" placeholder="期待値（任意）">
<button onclick="addDaily()">登録</button>

<canvas id="dailyChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const API_URL="https://script.google.com/macros/s/xxxx/daily/exec";
let dailyData=[];

function addDaily(){
  const date = document.getElementById("date").value;
  const diff = Number(document.getElementById("diff").value);
  const expect = Number(document.getElementById("expect").value) || 0;

  if(!date || isNaN(diff)){
    alert("日付と差枚は必須です");
    return;
  }

  fetch(API_URL,{
    method:"POST",
    body: JSON.stringify({date, diff, expect})
  }).then(()=>{ clearInput(); loadDaily(); });
}

function clearInput(){
  document.getElementById("diff").value="";
  document.getElementById("expect").value="";
}

function loadDaily(){
  fetch(API_URL)
    .then(res=>res.json())
    .then(data=>{ dailyData=data; renderChart(); });
}

function renderChart(){
  const ctx = document.getElementById("dailyChart");
  const labels = dailyData.map(d=>d.date);
  const diffData = dailyData.map(d=>d.diff);
  const expectData = dailyData.map(d=>d.expect);

  new Chart(ctx,{
    type:"line",
    data:{
      labels,
      datasets:[
        {label:"差枚", data:diffData, borderColor:"red", fill:false},
        {label:"期待値", data:expectData, borderColor:"blue", fill:false}
      ]
    }
  });
}

window.onload = loadDaily;
</script>
