<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>当選履歴</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h1 class="title">当選履歴</h1>

<div class="container">

<div class="status-box" id="status">
合計ゲーム数：0<br>
BIG合計：0<br>
REG合計：0<br>
BIG確率：-<br>
REG確率：-
</div>

<div class="input-box">

<input id="spin" type="number" placeholder="回転数">

<select id="role">
<option value="">当選役を選択</option>
<option>REG</option>
<option>赤BIG</option>
<option>青BIG</option>
<option>黒BIG</option>
<option>異色BIG</option>
</select>

<select id="triggers">
<option value="">当選契機を選択</option>
<option>単独</option>
<option>一枚役A</option>
<option>一枚役B</option>
<option>一枚役C</option>
<option>一枚役D</option>
<option>共通１枚役</option>
<option>ベル</option>
<option>リプレイ</option>
<option>チェリー</option>
<option>スイカ</option>
<option>特リプ</option>
</select>

<textarea id="memo" rows="3" placeholder="メモ"></textarea>

<button onclick="addRecord()">登録</button>

</div>

<div class="record-list" id="list"></div>

</div>
