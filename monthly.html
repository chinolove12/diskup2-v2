<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>カレンダー</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/monthly.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<h1 class="title">収支カレンダー</h1>

<div class="container">

<div class="calendar-box">

<div class="calendar-header">

<button id="prev">◀</button>

<div id="title"></div>

<button id="next">▶</button>

</div>

<div class="summary">
  <div class="row">
    <div id="monthTotal">月収支：0</div>
    <div id="winRate">勝率：0%</div>
  </div>

  <div class="row">
    <div id="expectedTotal">月期待値：0</div>
    <div id="playDays">稼働日数：0</div>
  </div>
</div>

  <div class="row">
    <div id="totalGame">総ゲーム数：0G</div>
  </div>
</div>

<table id="calendar"></table>

<canvas id="chart" height="200"></canvas>

</div>

</div>

</body>
</html>
